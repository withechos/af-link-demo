<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全院房颤患者管理看板</title>
<meta name="description" content="全院房颤患者管理看板 - 科室概览与医生管理">
<meta property="og:title" content="全院房颤患者管理看板">
<meta property="og:description" content="房颤患者分布漏斗、科室分布与会诊管理、医生工作组运营数据">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💓</text></svg>">
<style>
:root{--bg:#F3F5F8;--card:#fff;--primary:#334155;--blue:#3B82F6;--blue-l:#EFF5FF;--red:#EF4444;--green:#10B981;--amber:#F59E0B;--purple:#8B5CF6;--t1:#1E293B;--t2:#64748B;--t3:#94A3B8;--bd:#E2E8F0;--sh:0 1px 3px rgba(0,0,0,.06);--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",sans-serif;background:var(--bg);color:var(--t1);font-size:12px;line-height:1.5}
.topbar{background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:48px;position:sticky;top:0;z-index:100}
.topbar-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.topbar-title svg{width:18px;height:18px}
.tab-bar{display:flex;gap:2px;background:rgba(255,255,255,.1);border-radius:6px;padding:2px}
.tab-btn{padding:4px 16px;border:none;background:none;color:rgba(255,255,255,.55);font-size:12px;font-weight:500;border-radius:5px;cursor:pointer;transition:.15s}
.tab-btn.active{background:rgba(255,255,255,.18);color:#fff}
.tab-btn:hover:not(.active){color:rgba(255,255,255,.85)}
.time-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.time-bar select,.grp-sel{padding:4px 8px;border:1px solid var(--bd);border-radius:5px;font-size:11.5px;background:#fff;color:var(--t1);cursor:pointer}
.time-bar label{font-size:11px;color:var(--t2)}
.main{padding:18px 22px;max-width:1560px;margin:0 auto}
.stitle{font-size:12.5px;font-weight:600;color:var(--primary);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.stitle::before{content:'';width:2.5px;height:13px;border-radius:2px;background:var(--blue)}
.row-top{display:grid;grid-template-columns:360px 1fr;gap:16px;margin-bottom:16px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--sh);padding:16px;border:1px solid var(--bd)}
.funnel-stage{display:flex;align-items:center;gap:10px;padding:7px 0}
.funnel-bar{height:28px;border-radius:5px;display:flex;align-items:center;justify-content:flex-end;padding-right:10px;color:#fff;font-size:12.5px;font-weight:700;transition:width .5s}
.funnel-bar:hover{opacity:.85}
.funnel-label{width:90px;flex-shrink:0;font-size:11.5px;font-weight:500;text-align:right}
.funnel-rate{font-size:10px;color:var(--t3);width:56px;flex-shrink:0}
.dtable{width:100%;border-collapse:collapse}
.dtable th{font-size:10.5px;font-weight:600;color:var(--t3);padding:6px 8px;border-bottom:1.5px solid var(--bd);text-align:left}
.dtable td{padding:7px 8px;font-size:12px;border-bottom:1px solid var(--bd)}
.dtable tbody tr{cursor:pointer;transition:.12s}
.dtable tbody tr:hover{background:var(--blue-l)}
.dn{font-weight:600;color:var(--primary)}.dc{font-weight:700;font-size:13px;color:var(--blue)}
.cb-w{width:72px;height:5px;background:#EEF0F4;border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:4px}
.cb-f{height:100%;border-radius:3px}
.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;white-space:nowrap}
.b-blue{background:var(--blue-l);color:var(--blue)}.b-green{background:#ECFDF5;color:var(--green)}.b-amber{background:#FFFBEB;color:#D97706}.b-red{background:#FEF2F2;color:var(--red)}.b-purple{background:#F5F3FF;color:var(--purple)}.b-gray{background:#F1F5F9;color:var(--t2)}.b-teal{background:#F0FDFA;color:#0D9488}
.chart-area{display:flex;align-items:flex-end;height:260px;padding:14px 0 0;position:relative}
.ch-y{position:absolute;left:0;top:14px;bottom:34px;width:28px;display:flex;flex-direction:column;justify-content:space-between;align-items:flex-end;padding-right:4px}
.ch-y span{font-size:9.5px;color:var(--t3)}
.ch-g{position:absolute;left:32px;right:0;top:14px;bottom:34px}
.ch-gl{position:absolute;left:0;right:0;height:1px;background:var(--bd)}
.ch-bars{display:flex;align-items:flex-end;gap:4px;flex:1;margin-left:36px;height:210px;position:relative;z-index:2}
.bg{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px}
.bp{display:flex;gap:3px;align-items:flex-end;height:210px}
.bc{display:flex;flex-direction:column;align-items:center}
.bs{width:24px;display:flex;flex-direction:column-reverse;border-radius:3px 3px 0 0;overflow:hidden;cursor:pointer;transition:.12s}
.bs:hover{opacity:.82}
.bseg{width:100%}
.bsl{font-size:8.5px;color:var(--t2);margin-top:2px;white-space:nowrap;font-weight:500}
.bl{font-size:10px;font-weight:600;color:var(--t1);text-align:center;margin-top:4px;white-space:nowrap}
.bl-active{color:var(--blue);text-decoration:underline;text-underline-offset:2px}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;padding-top:10px;border-top:1px solid var(--bd)}
.li{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--t2)}
.ld{width:8px;height:8px;border-radius:2px}
.sl{display:flex;gap:14px;margin-bottom:6px}
.sli{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--t2)}
.sw{width:16px;height:10px;border-radius:2px}
.stripe-bg{background-image:repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.35) 2px,rgba(255,255,255,.35) 4px)}
.src-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;margin:8px 0 12px}
.src-seg{height:100%}
.src-legend{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.src-legend-i{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--t2)}
.src-legend-d{width:8px;height:8px;border-radius:2px}
.mo{display:none;position:fixed;inset:0;background:rgba(30,41,59,.3);z-index:200;justify-content:flex-end}
.mo.open{display:flex}
.mp{width:700px;max-width:90vw;background:#fff;height:100%;overflow-y:auto;box-shadow:-6px 0 30px rgba(0,0,0,.1);animation:si .2s ease}
@keyframes si{from{transform:translateX(100%)}to{transform:translateX(0)}}
.mh{position:sticky;top:0;background:#fff;padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;z-index:10}
.mh h3{font-size:13.5px;font-weight:600}
.mc{width:28px;height:28px;border:none;background:var(--bg);border-radius:5px;cursor:pointer;font-size:13px;color:var(--t2);display:flex;align-items:center;justify-content:center}
.mb{padding:16px 18px}
.ptable{width:100%;border-collapse:collapse}
.ptable th{font-size:10px;font-weight:600;color:var(--t3);padding:6px 6px;border-bottom:1.5px solid var(--bd);text-align:left;position:sticky;top:0;background:#fff}
.ptable td{padding:7px 6px;font-size:11.5px;border-bottom:1px solid var(--bd)}
.ptable tbody tr{cursor:pointer;transition:.12s}
.ptable tbody tr:hover{background:var(--blue-l)}
.pn{font-weight:600;color:var(--primary)}
.suggest-row{background:#FFFBEB!important}.suggest-row:hover{background:#FEF3C7!important}
.p3h{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px}
.p3a{width:42px;height:42px;border-radius:10px;background:var(--blue-l);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.p3n{font-size:14px;font-weight:700;color:var(--primary)}
.p3m{font-size:11px;color:var(--t2);margin-top:1px}
.p3g{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.p3c{background:var(--bg);border-radius:6px;padding:10px 12px}
.p3cl{font-size:10px;color:var(--t3);margin-bottom:2px}
.p3cv{font-size:12.5px;font-weight:600}
.p3tl{border-left:2px solid var(--bd);padding-left:14px;margin-left:6px}
.p3e{position:relative;padding-bottom:12px}
.p3e::before{content:'';position:absolute;left:-19px;top:3px;width:8px;height:8px;border-radius:50%;background:var(--blue);border:2px solid #fff}
.p3ed{font-size:10px;color:var(--t3)}.p3et{font-size:11.5px}
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border:none;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;transition:.12s}
.btn-p{background:var(--blue);color:#fff}.btn-p:hover{background:#2563EB}
.btn-o{background:none;border:1.5px solid var(--bd);color:var(--t1)}.btn-o:hover{border-color:var(--blue);color:var(--blue)}
.btn-g{background:var(--green);color:#fff}
.btn-amber{background:var(--amber);color:#fff}.btn-amber:hover{background:#D97706}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.kpi{background:#fff;border-radius:var(--radius);box-shadow:var(--sh);padding:14px 12px;border:1px solid var(--bd);text-align:center}
.kpi-v{font-size:22px;font-weight:800;letter-spacing:-.3px}
.kpi-l{font-size:10.5px;color:var(--t2);margin-top:2px}
.kpi-t{font-size:10px;font-weight:600;margin-top:2px}
.qa-row{display:flex;gap:10px;margin-bottom:16px}
.qa{flex:1;background:#fff;border:1.5px solid var(--bd);border-radius:var(--radius);padding:14px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:12px}
.qa:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(0,0,0,.06)}
.qa-i{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qa-i svg{width:18px;height:18px}
.qa-t{font-size:12.5px;font-weight:600;color:var(--primary)}
.qa-d{font-size:10.5px;color:var(--t2);margin-top:1px}
.pipe{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.pipe-col{flex:1;min-width:110px;background:#fff;border-radius:var(--radius);border:1px solid var(--bd);overflow:hidden}
.pipe-hd{padding:8px 10px;font-size:10.5px;font-weight:600;color:var(--t1);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.pipe-cnt{font-size:13px;font-weight:700}
.pipe-body{padding:6px;max-height:220px;overflow-y:auto}
.pipe-card{padding:6px 8px;border-radius:5px;background:var(--bg);margin-bottom:4px;cursor:pointer;transition:.12s;font-size:11px}
.pipe-card:hover{background:var(--blue-l)}
.pipe-card .pn{font-size:11px}
.pipe-card-meta{font-size:9.5px;color:var(--t3);margin-top:1px}
.inner-tabs{display:flex;gap:0;border-bottom:1.5px solid var(--bd);margin-bottom:12px}
.inner-tab{padding:6px 14px;font-size:11.5px;font-weight:600;color:var(--t3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:.15s}
.inner-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.inner-tab:hover:not(.active){color:var(--t1)}
/* group selector bar */
.grp-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:10px 14px;background:#fff;border-radius:var(--radius);border:1px solid var(--bd);box-shadow:var(--sh)}
.grp-bar label{font-size:11.5px;font-weight:600;color:var(--t1)}
.grp-bar .ep-tag{font-size:10px;padding:2px 6px;border-radius:3px;margin-left:6px}
.toast{position:fixed;top:60px;right:24px;background:var(--primary);color:#fff;padding:10px 18px;border-radius:6px;font-size:12px;font-weight:500;z-index:400;box-shadow:0 4px 16px rgba(0,0,0,.15);transform:translateY(-8px);opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.tooltip{position:fixed;background:var(--primary);color:#fff;padding:8px 12px;border-radius:6px;font-size:11px;pointer-events:none;z-index:300;box-shadow:0 4px 12px rgba(0,0,0,.15);max-width:220px;display:none;line-height:1.6}
.tooltip.show{display:block}
.tt-row{display:flex;justify-content:space-between;gap:14px}
.tt-dot{width:6px;height:6px;border-radius:2px;display:inline-block;margin-right:3px;vertical-align:middle}
.vh{display:none!important}
@media(max-width:1100px){.row-top{grid-template-columns:1fr}.kpi-row{grid-template-columns:repeat(3,1fr)}}
@media(max-width:700px){.main{padding:12px}.kpi-row{grid-template-columns:repeat(2,1fr)}.qa-row,.pipe{flex-direction:column}.topbar{padding:0 12px}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>全院房颤患者管理看板</div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="tab-bar"><button class="tab-btn active" onclick="switchView('dept')">科室概览</button><button class="tab-btn" onclick="switchView('doctor')">医生管理</button></div>
    <span style="font-size:11px;color:rgba(255,255,255,.5)" id="timeDisp"></span>
    <span style="width:26px;height:26px;background:rgba(255,255,255,.12);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff">李</span>
  </div>
</div>
<div class="main">
  <div class="time-bar">
    <label>时间窗口</label>
    <select id="selYear" onchange="updateMonthOpts();updateTime()"></select>
    <select id="selMonth" onchange="updateTime()"></select>
  </div>
  <div class="row-top">
    <div class="card"><div class="stitle">房颤患者分布漏斗</div><div id="funnelChart"></div></div>
    <div class="card" style="overflow-x:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="stitle" style="margin-bottom:0">科室分布与会诊情况</div>
        <span style="font-size:10.5px;color:var(--t3)">总计 <b style="color:var(--blue)" id="totalPt"></b> 人</span>
      </div>
      <table class="dtable" id="deptTable"><thead><tr><th>科室</th><th>患者数</th><th style="width:36%">会诊完成率</th><th>待会诊</th><th></th></tr></thead><tbody></tbody></table>
    </div>
  </div>
  <!-- DEPT VIEW -->
  <div id="view-dept"><div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div class="stitle" style="margin-bottom:0">心内科 · 医生工作组</div>
      <span style="font-size:9.5px;color:var(--t3)">点击组名切换至医生管理</span>
    </div>
    <div class="inner-tabs" id="cardioTabs"><button class="inner-tab active" onclick="setCardioTab('all')">全部</button><button class="inner-tab" onclick="setCardioTab('ep')">电生理专科</button><button class="inner-tab" onclick="setCardioTab('non')">非专科</button></div>
    <div class="sl">
      <div class="sli"><div class="sw" style="background:var(--blue)"></div>门诊来源</div>
      <div class="sli"><div class="sw stripe-bg" style="background:var(--blue)"></div>急诊/转科来源</div>
    </div>
    <div id="stackedChart"></div>
    <!-- Surgery Rate -->
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:16px;cursor:pointer" onclick="openSurgeryReview()">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="stitle" style="margin-bottom:0;font-size:12px">心内科住院房颤患者上台率</div>
      </div>
      <div id="surgeryRateDisplay" style="display:flex;align-items:center;gap:10px"></div>
      <span style="font-size:10px;color:var(--blue);margin-left:auto;white-space:nowrap">查看评估表 →</span>
    </div>
  </div></div>
  <!-- DOCTOR VIEW -->
  <div id="view-doctor" class="vh">
    <!-- Group selector -->
    <div class="grp-bar">
      <label>当前工作组</label>
      <select class="grp-sel" id="grpSel" onchange="switchGroup()"></select>
      <span id="grpEpTag"></span>
      <span style="flex:1"></span>
      <span style="font-size:10.5px;color:var(--t3)" id="grpMembers"></span>
    </div>
    <div class="qa-row">
      <div class="qa" onclick="showConsultModal('invite')">
        <div class="qa-i" style="background:var(--blue-l);color:var(--blue)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
        <div><div class="qa-t">收到的会诊邀约</div><div class="qa-d">其他科室发来的请求</div></div>
        <span class="badge b-red" style="margin-left:auto">3</span>
      </div>
      <div class="qa" onclick="showConsultModal('suggest')">
        <div class="qa-i" style="background:#FFFBEB;color:#D97706"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg></div>
        <div><div class="qa-t">建议会诊</div><div class="qa-d">主动建议其他科室发起</div></div>
      </div>
      <div class="qa" onclick="showConsultModal('send')">
        <div class="qa-i" style="background:#ECFDF5;color:var(--green)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></div>
        <div><div class="qa-t">发起会诊</div><div class="qa-d">邀请其他科室协助</div></div>
      </div>
      <div class="qa" onclick="showConsultModal('history')">
        <div class="qa-i" style="background:#F1F5F9;color:var(--t2)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
        <div><div class="qa-t">会诊记录</div><div class="qa-d">已完成 12 次</div></div>
      </div>
    </div>
    <div class="kpi-row" id="kpiRow"></div>
    <div class="card" style="margin-bottom:16px"><div class="stitle">患者状态看板</div><div class="pipe" id="pipeline"></div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card"><div class="stitle" id="miniChartTitle"></div>
        <div class="sl"><div class="sli"><div class="sw" style="background:var(--blue)"></div>门诊来源</div><div class="sli"><div class="sw stripe-bg" style="background:var(--blue)"></div>急诊/转科来源</div></div>
        <div id="myGroupChart"></div>
      </div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="stitle" style="margin-bottom:0">本组全部患者</div><span class="badge b-blue" id="myPtCount"></span></div>
        <div style="max-height:340px;overflow-y:auto"><table class="ptable" id="myPtTable"><thead><tr><th>姓名</th><th>年龄</th><th>来源</th><th>分型</th><th>状态</th></tr></thead><tbody></tbody></table></div>
      </div>
    </div>
  </div>
</div>
<div class="mo" id="modal"><div class="mp"><div class="mh"><h3 id="mTitle"></h3><button class="mc" onclick="closeModal()">✕</button></div><div class="mb" id="mBody"></div></div></div>
<div class="tooltip" id="tooltip"></div>
<div class="toast" id="toast"></div>
<script>
const NOW_Y=2026,NOW_M=6;
const SOURCES=['门诊','住院','急诊','体检'];
const SRC_C={'门诊':'#3B82F6','住院':'#10B981','急诊':'#EF4444','体检':'#8B5CF6'};
const SRC_B={'门诊':'b-blue','住院':'b-green','急诊':'b-red','体检':'b-purple'};
const DEPTS=[

// ═══ DATA ═══
function seed(yr,mo){
  const s=yr*100+mo;
  const r=()=>{let x=Math.sin(s*9301+r.i++*49297)*.5+.5;return x;};r.i=0;
  const jit=(b,p)=>Math.max(1,Math.round(b*(1+(r()*2-1)*p)));

  currentFunnel=FUNNEL_BASE.map(f=>({...f,value:jit(f.value,.12)}));
  DEPTS.forEach(d=>{d._count=jit(d.count,.15);});

  // ── Group chart data: EP vs non-EP logic ──
  groupData=GROUPS.map(g=>{
    if(g.ep){
      // EP: high ablation recommendation → flows to cert → admit → surgery (~30% of admitted)
      const oA=26+~~(r()*10),oRfa=~~(oA*(.55+r()*.15)),oCert=~~(oRfa*(.75+r()*.1)),oAdm=~~(oCert*(.8+r()*.1)),oSurg=Math.max(1,~~(oAdm*(.25+r()*.12)));
      const eA=6+~~(r()*6),eRfa=~~(eA*(.5+r()*.2)),eCert=~~(eRfa*(.7+r()*.15)),eAdm=~~(eCert*(.8+r()*.1)),eSurg=Math.max(0,~~(eAdm*(.2+r()*.12)));
      return{...g,outpatient:{af:oA,rfa:oRfa,cert:oCert,admit:oAdm,surgery:oSurg},emergency:{af:eA,rfa:eRfa,cert:eCert,admit:eAdm,surgery:eSurg}};
    }else{
      // Non-EP: low ablation, surgery very rare (0-1)
      const oA=22+~~(r()*12),oRfa=~~(oA*(.15+r()*.1)),oCert=Math.max(0,~~(oRfa*(.4+r()*.2))),oAdm=Math.max(0,~~(oCert*(.5+r()*.2))),oSurg=r()>.75?1:0;
      const eA=4+~~(r()*5),eRfa=~~(eA*(.15+r()*.1)),eCert=Math.max(0,~~(eRfa*(.4+r()*.2))),eAdm=Math.max(0,~~(eCert*(.5+r()*.2))),eSurg=0;
      return{...g,outpatient:{af:oA,rfa:oRfa,cert:oCert,admit:oAdm,surgery:oSurg},emergency:{af:eA,rfa:eRfa,cert:eCert,admit:eAdm,surgery:eSurg}};
    }
  });

  // ── Dept patients ──
  const srcW={'心内科':[.55,.25,.12,.08],'急诊科':[.05,.15,.72,.08],default:[.45,.30,.15,.10]};
  deptPatients={};
  DEPTS.forEach(d=>{
    const w=srcW[d.name]||srcW.default;const pts=[];
    for(let i=0;i<d._count;i++){
      let rv=r(),src,cum=0;for(let si=0;si<SOURCES.length;si++){cum+=w[si];if(rv<cum){src=SOURCES[si];break;}}if(!src)src=SOURCES[0];
      const cha=~~(r()*7),grp=GROUPS[~~(r()*GROUPS.length)];
      pts.push({id:'P'+s+'_'+i+'_'+d.name.charCodeAt(0),name:rn(),age:45+~~(r()*40),gender:r()>.45?'男':'女',dept:d.name,source:src,afType:AF_T[~~(r()*AF_T.length)],status:OLD_ST[~~(r()*OLD_ST.length)],cha2ds2:cha,anticoag:r()>.3?'华法林':(r()>.5?'利伐沙班':'达比加群'),doctor:grp.name.replace('组',''),isEP:grp.ep,lastVisit:yr+'-'+String(mo).padStart(2,'0')+'-'+String(1+~~(r()*28)).padStart(2,'0'),echo:(35+~~(r()*30))+'mm',hasBleed:r()>.65?'是':'否',ablationCandidate:cha>=2&&r()>.3});
    }
    pts.sort((a,b)=>SOURCES.indexOf(a.source)-SOURCES.indexOf(b.source));
    deptPatients[d.name]=pts;
  });

  // ── Group patients derived from chart data ──
  groupPatients={};
  groupData.forEach((g,gi)=>{
    const tot=g.outpatient,emt=g.emergency;
    const totalAf=tot.af+emt.af,totalRfa=tot.rfa+emt.rfa,totalCert=tot.cert+emt.cert,totalAdm=tot.admit+emt.admit,totalSurg=tot.surgery+emt.surgery;
    // Derive pipeline counts from chart data
    const nSurg=totalSurg;
    const nAdmit=Math.max(0,totalAdm-totalSurg); // in hospital awaiting surgery
    const nCert=Math.max(0,totalCert-totalAdm);
    const nNoShow=Math.max(0,~~(nCert*.3)); // subset overdue
    const nCertOk=Math.max(0,nCert-nNoShow);
    const nRec=Math.max(0,totalRfa-totalCert); // recommended but no cert yet
    const nOutp=Math.max(0,totalAf-totalRfa); // outpatient follow-up only
    const nPostOp=Math.max(1,~~(nSurg*.4));
    const nLeft=Math.max(0,~~(nSurg*.3));

    const dist={
      '门诊接诊':nOutp,'建议手术':nRec,'开住院证':nCertOk,
      '住院':nAdmit,'未入院':nNoShow,'术后':nPostOp,'离院':nLeft
    };
    const pts=[];
    LIFE_ST.forEach(st=>{
      const n=dist[st]||0;
      for(let i=0;i<n;i++){
        const isMZ=st==='门诊接诊'||st==='建议手术';
        pts.push({id:'MG'+s+'_'+gi+'_'+st[0]+i,name:rn(),age:45+~~(r()*40),gender:r()>.45?'男':'女',
          source:isMZ?(r()>.1?'门诊':(r()>.5?'急诊':'体检')):(r()>.6?'门诊':'急诊'),
          afType:AF_T[~~(r()*AF_T.length)],lifeStatus:st,cha2ds2:~~(r()*7),
          anticoag:r()>.3?'华法林':(r()>.5?'利伐沙班':'达比加群'),
          lastVisit:yr+'-'+String(mo).padStart(2,'0')+'-'+String(1+~~(r()*28)).padStart(2,'0'),
          echo:(35+~~(r()*30))+'mm',hasBleed:r()>.65?'是':'否',dept:'心内科'});
      }
    });
    groupPatients[gi]=pts;
  });

  // ── Inpatient AF patients for surgery rate review ──
  // All cardiology inpatients with AF diagnosis
  const PRIMARY_DX=['冠状动脉粥样硬化性心脏病','高血压性心脏病','扩张型心肌病','瓣膜性心脏病','心力衰竭','心肌炎','肺源性心脏病','主动脉瓣狭窄','二尖瓣反流','心包炎'];
  const ANTICOAG_STATUS=['规律服用','不规律','未使用','近期调整','禁忌未用'];
  const ANTICOAG_BADGE={'规律服用':'b-green','不规律':'b-amber','未使用':'b-red','近期调整':'b-purple','禁忌未用':'b-gray'};
  window.ANTICOAG_BADGE=ANTICOAG_BADGE;

  const totalInpatientAF=groupData.reduce((s,g)=>s+g.outpatient.admit+g.emergency.admit,0);
  const totalSurgeryAF=groupData.reduce((s,g)=>s+g.outpatient.surgery+g.emergency.surgery,0);
  window.surgeryRateData={total:totalInpatientAF,surgery:totalSurgeryAF,rate:totalInpatientAF>0?((totalSurgeryAF/totalInpatientAF)*100).toFixed(1):'0'};

  window.inpatientAFList=[];
  const moStr=String(mo).padStart(2,'0');
  for(let i=0;i<totalInpatientAF;i++){
    const grp=GROUPS[~~(r()*GROUPS.length)];
    const didSurg=i<totalSurgeryAF;
    const cha=2+~~(r()*5);
    const acStat=ANTICOAG_STATUS[~~(r()*ANTICOAG_STATUS.length)];
    const la1=35+~~(r()*25),la2=la1+~~((r()*6)-3);
    const ef1=45+~~(r()*20),ef2=ef1+~~((r()*6)-3);
    const dt1=yr+'-'+moStr+'-'+String(1+~~(r()*14)).padStart(2,'0');
    const dt2=yr+'-'+moStr+'-'+String(15+~~(r()*13)).padStart(2,'0');
    window.inpatientAFList.push({
      id:'INP'+s+'_'+i,name:rn(),age:50+~~(r()*35),gender:r()>.42?'男':'女',
      doctor:grp.name.replace('组',''),group:grp.name,isEP:grp.ep,
      primaryDx:PRIMARY_DX[~~(r()*PRIMARY_DX.length)],
      afType:AF_T[~~(r()*AF_T.length)],
      cha2ds2:cha, hasBleedRisk:r()>.6?'是':'否',
      anticoag:r()>.3?'华法林':(r()>.5?'利伐沙班':'达比加群'),
      anticoagStatus:acStat,
      didSurgery:didSurg,
      echo1:{date:dt1,la:la1+'mm',ef:ef1+'%',findings:r()>.5?'左房增大，二尖瓣少量反流':'左房轻度增大，未见明显瓣膜病变'},
      echo2:{date:dt2,la:la2+'mm',ef:ef2+'%',findings:r()>.5?'左房增大较前相仿，心功能正常':'左房内径同前，射血分数正常范围'},
      needsReview:acStat==='未使用'||acStat==='不规律'||cha>=4
    });
  }
}

function renderFunnel(){
  const el=document.getElementById('funnelChart'),mx=currentFunnel[0].value;
  el.innerHTML=currentFunnel.map((f,i)=>{const pct=f.value/mx*100,conv=i>0?((f.value/currentFunnel[i-1].value)*100).toFixed(1)+'%':'';return`<div class="funnel-stage"><div class="funnel-label">${f.label}</div><div style="flex:1"><div class="funnel-bar" style="width:${pct}%;background:${f.color}">${f.value}</div></div><div class="funnel-rate">${conv?'转化 '+conv:''}</div></div>`;}).join('');
}
function renderDeptTable(){
  const total=DEPTS.reduce((s,d)=>s+d._count,0);document.getElementById('totalPt').textContent=total;
  document.querySelector('#deptTable tbody').innerHTML=DEPTS.map(d=>{const pend=Math.round(d._count*(1-d.consult));return`<tr onclick="openDept('${d.name}')"><td><span class="dn">${d.name}</span></td><td><span class="dc">${d._count}</span></td><td><div style="display:flex;align-items:center;gap:4px"><div class="cb-w"><div class="cb-f" style="width:${d.consult*100}%;background:${d.color}"></div></div><span style="font-size:11px;font-weight:600;color:${d.color}">${(d.consult*100).toFixed(0)}%</span></div></td><td><span class="badge ${pend>15?'b-red':pend>8?'b-amber':'b-green'}">${pend}</span></td><td><button class="btn btn-o" style="font-size:10px;padding:3px 8px" onclick="event.stopPropagation();openDept('${d.name}')">查看</button></td></tr>`;}).join('');

function renderStackedChart(id,data){
  let filtered=data;
  if(cardioTab==='ep')filtered=data.filter(g=>g.ep);else if(cardioTab==='non')filtered=data.filter(g=>!g.ep);
  let mx=0;filtered.forEach(g=>{['outpatient','emergency'].forEach(s=>{const t=SK.reduce((a,k)=>a+g[s][k],0);if(t>mx)mx=t;});});
  mx=Math.ceil(mx/10)*10||50;const bH=210;
  let h='<div class="chart-area"><div class="ch-y">';for(let i=4;i>=0;i--)h+=`<span>${Math.round(mx*i/4)}</span>`;
  h+='</div><div class="ch-g">';for(let i=0;i<=4;i++)h+=`<div class="ch-gl" style="bottom:${i*25}%"></div>`;
  h+='</div><div class="ch-bars">';
  filtered.forEach(g=>{
    const gi=GROUPS.findIndex(x=>x.name===g.name);
    const isActive=gi===selGrpIdx;
    h+='<div class="bg"><div class="bp">';
    h+=`<div class="bc"><div class="bs" onmouseenter="showTT(event,'${g.name}','outpatient')" onmouseleave="hideTT()">`;
    SK.forEach(k=>{h+=`<div class="bseg" style="height:${(g.outpatient[k]/mx)*bH}px;background:${SC[k]}"></div>`;});
    h+=`</div><div class="bsl">门诊</div></div>`;
    h+=`<div class="bc"><div class="bs" onmouseenter="showTT(event,'${g.name}','emergency')" onmouseleave="hideTT()">`;
    SK.forEach(k=>{h+=`<div class="bseg" style="height:${(g.emergency[k]/mx)*bH}px;background:${SC[k]};position:relative;overflow:hidden"><div style="position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.35) 2px,rgba(255,255,255,.35) 4px)"></div></div>`;});
    h+=`</div><div class="bsl">急诊/转科</div></div>`;
    h+=`</div><div class="bl ${isActive?'bl-active':''}" style="cursor:pointer" onclick="switchView('doctor');document.getElementById('grpSel').value=${gi};switchGroup();">${g.name}${g.ep?' (EP)':''}</div></div>`;
  });
  h+='</div></div><div class="legend">';SK.forEach(k=>{h+=`<div class="li"><div class="ld" style="background:${SC[k]}"></div>${SL_[k]}</div>`;});h+='</div>';
  document.getElementById(id).innerHTML=h;
}
function setCardioTab(tab){
  cardioTab=tab;document.querySelectorAll('#cardioTabs .inner-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('#cardioTabs .inner-tab').forEach(b=>{if((tab==='all'&&b.textContent==='全部')||(tab==='ep'&&b.textContent.includes('电生理'))||(tab==='non'&&b.textContent.includes('非专科')))b.classList.add('active');});

}

const ttEl=document.getElementById('tooltip');
function showTT(e,name,src){const g=groupData.find(x=>x.name===name);if(!g)return;const d=g[src],sl=src==='outpatient'?'门诊':'急诊/转科';let h=`<div style="font-weight:700;margin-bottom:3px">${name}${g.ep?' (EP)':''} · ${sl}</div>`;SK.forEach(k=>{h+=`<div class="tt-row"><span><span class="tt-dot" style="background:${SC[k]}"></span>${SL_[k]}</span><span style="font-weight:700;margin-left:10px">${d[k]}</span></div>`;});if(d.af>0)h+=`<div style="margin-top:4px;padding-top:4px;border-top:1px solid rgba(255,255,255,.2);font-size:10px">全程转化 <b>${((d.surgery/d.af)*100).toFixed(1)}%</b></div>`;ttEl.innerHTML=h;ttEl.classList.add('show');ttEl.style.left=(e.clientX+12)+'px';ttEl.style.top=(e.clientY-8)+'px';}

// ═══ DEPT MODAL ═══
function openDept(dn){
  const pts=deptPatients[dn]||[];const isC=dn==='心内科';const cands=pts.filter(p=>p.ablationCandidate);
  const srcCnt={};SOURCES.forEach(s=>{srcCnt[s]=pts.filter(p=>p.source===s).length;});const total=pts.length;
  document.getElementById('mTitle').textContent=dn+' · 房颤患者';
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:11.5px;color:var(--t2)">共 <b style="color:var(--blue)">${total}</b> 人${!isC&&cands.length?`，<b style="color:var(--amber)">${cands.length}</b> 人符合消融适应证`:''}</span><div style="display:flex;gap:6px">${!isC?`<button class="btn btn-amber" style="font-size:10px" onclick="suggestBatch('${dn}')">建议会诊 (${cands.length})</button>`:''}</div></div>`;
  html+=`<div class="src-bar">${SOURCES.map(s=>srcCnt[s]?`<div class="src-seg" style="width:${srcCnt[s]/total*100}%;background:${SRC_C[s]}"></div>`:'').join('')}</div><div class="src-legend">${SOURCES.map(s=>srcCnt[s]?`<div class="src-legend-i"><div class="src-legend-d" style="background:${SRC_C[s]}"></div>${s} ${srcCnt[s]} (${(srcCnt[s]/total*100).toFixed(0)}%)</div>`:'').join('')}</div>`;
  if(isC)html+=`<div class="inner-tabs" id="deptDetailTabs"><button class="inner-tab active" onclick="filterDeptTab('all')">全部 (${total})</button><button class="inner-tab" onclick="filterDeptTab('ep')">电生理 (${pts.filter(p=>p.isEP).length})</button><button class="inner-tab" onclick="filterDeptTab('non')">非专科 (${pts.filter(p=>!p.isEP).length})</button></div>`;
  html+=`<table class="ptable"><thead><tr><th>姓名</th><th>性别</th><th>年龄</th><th>来源</th><th>分型</th>${isC?'<th>专科</th>':''}<th>状态</th><th>CHA₂DS₂</th><th></th></tr></thead><tbody id="deptDetailBody"></tbody></table>`;
  document.getElementById('mBody').innerHTML=html;renderDeptRows(dn,'all');document.getElementById('modal').classList.add('open');
}
function renderDeptRows(dn,f){
  let pts=deptPatients[dn]||[];const isC=dn==='心内科';
  if(f==='ep')pts=pts.filter(p=>p.isEP);else if(f==='non')pts=pts.filter(p=>!p.isEP);
  document.getElementById('deptDetailBody').innerHTML=pts.map(p=>{const c=p.ablationCandidate&&!isC;return`<tr onclick="showDeptP360('${p.id}','${dn}')" class="${c?'suggest-row':''}"><td><span class="pn">${p.name}</span></td><td>${p.gender}</td><td>${p.age}</td><td><span class="badge ${SRC_B[p.source]}">${p.source}</span></td><td>${p.afType}</td>${isC?`<td><span class="badge ${p.isEP?'b-teal':'b-gray'}">${p.isEP?'电生理':'非专科'}</span></td>`:''}<td><span class="badge ${OLD_SB[p.status]}">${p.status}</span></td><td style="font-weight:700;color:${p.cha2ds2>=4?'var(--red)':p.cha2ds2>=2?'#D97706':'var(--green)'}">${p.cha2ds2}</td><td style="white-space:nowrap">${c?`<button class="btn btn-amber" style="font-size:9px;padding:2px 6px;margin-right:2px" onclick="event.stopPropagation();suggestOne('${p.id}','${dn}')">建议会诊</button>`:''}<button class="btn btn-o" style="font-size:9px;padding:2px 6px" onclick="event.stopPropagation();showDeptP360('${p.id}','${dn}')">360°</button></td></tr>`;}).join('');
}
window.filterDeptTab=function(f){const dn=document.getElementById('mTitle').textContent.split(' ·')[0];document.querySelectorAll('#deptDetailTabs .inner-tab').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');renderDeptRows(dn,f);};

// ═══ SUGGEST ═══
function suggestOne(pid,dn){const p=(deptPatients[dn]||[]).find(x=>x.id===pid);if(!p)return;document.getElementById('mTitle').textContent='建议会诊';document.getElementById('mBody').innerHTML=`<button class="btn btn-o" style="margin-bottom:12px;font-size:10px" onclick="openDept('${dn}')">← 返回${dn}</button><div style="background:var(--bg);border-radius:6px;padding:12px;margin-bottom:14px"><div style="font-weight:600;font-size:12.5px;margin-bottom:4px">${p.name} · ${p.gender} · ${p.age}岁</div><div style="font-size:11px;color:var(--t2)">${dn} · ${p.afType}房颤 · CHA₂DS₂-VASc ${p.cha2ds2}分 · ${p.source}</div></div><div style="font-size:11.5px;margin-bottom:12px">该患者CHA₂DS₂-VASc ${p.cha2ds2}分，${p.afType}房颤，可能符合射频消融术适应证。建议${dn}主管医师发起心内科会诊。</div><div style="margin-bottom:10px"><label style="font-size:11px;font-weight:600;display:block;margin-bottom:4px">建议理由</label><textarea style="width:100%;padding:6px 8px;border:1px solid var(--bd);border-radius:5px;font-size:11.5px;height:64px;resize:vertical">该患者${p.afType}房颤，CHA₂DS₂-VASc ${p.cha2ds2}分，左房内径${p.echo}，建议至心内科电生理专科评估射频消融术适应证。</textarea></div><button class="btn btn-amber" style="width:100%;justify-content:center" onclick="showToast('已向${dn}发送会诊建议');setTimeout(()=>openDept('${dn}'),600)">发送建议</button>`;}
function suggestBatch(dn){const pts=(deptPatients[dn]||[]).filter(p=>p.ablationCandidate);document.getElementById('mTitle').textContent='批量建议会诊 · '+dn;document.getElementById('mBody').innerHTML=`<button class="btn btn-o" style="margin-bottom:12px;font-size:10px" onclick="openDept('${dn}')">← 返回</button><div style="font-size:11.5px;color:var(--t2);margin-bottom:12px">以下 <b>${pts.length}</b> 名患者可能符合消融适应证。</div><table class="ptable"><thead><tr><th style="width:24px"><input type="checkbox" checked onchange="this.closest('table').querySelectorAll('tbody input').forEach(c=>c.checked=this.checked)"></th><th>姓名</th><th>年龄</th><th>来源</th><th>分型</th><th>CHA₂DS₂</th></tr></thead><tbody>${pts.map(p=>`<tr><td><input type="checkbox" checked></td><td><span class="pn">${p.name}</span></td><td>${p.age}</td><td><span class="badge ${SRC_B[p.source]}">${p.source}</span></td><td>${p.afType}</td><td style="font-weight:700;color:${p.cha2ds2>=4?'var(--red)':'#D97706'}">${p.cha2ds2}</td></tr>`).join('')}</tbody></table><div style="margin-top:12px"><label style="font-size:11px;font-weight:600;display:block;margin-bottom:4px">统一建议理由</label><textarea style="width:100%;padding:6px 8px;border:1px solid var(--bd);border-radius:5px;font-size:11.5px;height:48px;resize:vertical">上述患者房颤评估符合射频消融术适应证，建议发起心内科电生理专科会诊。</textarea></div><button class="btn btn-amber" style="width:100%;justify-content:center;margin-top:10px" onclick="showToast('已批量发送${pts.length}条会诊建议');setTimeout(()=>openDept('${dn}'),600)">批量发送</button>`;}

function showDeptP360(pid,dn){renderP360((deptPatients[dn]||[]).find(x=>x.id===pid),dn,()=>openDept(dn));}
function showMyP360(pid,gi){renderP360((groupPatients[gi]||[]).find(x=>x.id===pid),'心内科（本组）',null);}

  const tl=[{d:p.lastVisit?.replace(/-\d+$/,'-02')||'',t:`${p.source}来源，${p.afType}房颤`},{d:p.lastVisit?.replace(/-\d+$/,'-05')||'',t:'心脏超声 LA '+p.echo},{d:p.lastVisit?.replace(/-\d+$/,'-08')||'',t:'启动抗凝：'+p.anticoag},{d:p.lastVisit?.replace(/-\d+$/,'-12')||'',t:p.cha2ds2>=3?'CHA₂DS₂ '+p.cha2ds2+'分，建议射频消融':'CHA₂DS₂ '+p.cha2ds2+'分，药物治疗'},{d:p.lastVisit||'',t:'当前：'+st}];

    <div style="margin-left:auto;display:flex;gap:6px">${isO&&p.ablationCandidate?`<button class="btn btn-amber" style="font-size:10px" onclick="suggestOne('${p.id}','${p.dept}')">建议会诊</button>`:''} ${isO?`<button class="btn btn-p" style="font-size:10px" onclick="showToast('转诊已发起')">转诊心内科</button>`:''}</div></div>
    <div class="p3g"><div class="p3c"><div class="p3cl">房颤分型</div><div class="p3cv">${p.afType}</div></div><div class="p3c"><div class="p3cl">CHA₂DS₂-VASc</div><div class="p3cv" style="color:${p.cha2ds2>=4?'var(--red)':p.cha2ds2>=2?'#D97706':'var(--green)'}">${p.cha2ds2} 分</div></div><div class="p3c"><div class="p3cl">抗凝方案</div><div class="p3cv">${p.anticoag}</div></div><div class="p3c"><div class="p3cl">出血风险</div><div class="p3cv">${p.hasBleed==='是'?'高风险':'低风险'}</div></div><div class="p3c"><div class="p3cl">左房内径</div><div class="p3cv">${p.echo}</div></div><div class="p3c"><div class="p3cl">来源 / 状态</div><div class="p3cv"><span class="badge ${SRC_B[p.source]||'b-blue'}">${p.source}</span> <span class="badge ${LIFE_C[st]||OLD_SB[st]||'b-blue'}">${st}</span></div></div></div>
    <div class="stitle">诊疗时间线</div><div class="p3tl">${tl.map(t=>`<div class="p3e"><div class="p3ed">${t.d}</div><div class="p3et">${t.t}</div></div>`).join('')}</div>`;
  document.getElementById('modal').classList.add('open');
}

  const color=pct>=60?'var(--green)':pct>=40?'var(--amber)':'var(--red)';

    <div class="p3h">
      <div class="p3a">${p.name[0]}</div>
      <div><div class="p3n">${p.name}</div><div class="p3m">${p.gender} · ${p.age}岁 · ${p.group}${p.isEP?' (电生理)':' (非专科)'} · 主管：${p.doctor}</div></div>
      ${p.needsReview?'<span class="badge b-red" style="margin-left:auto;align-self:center">需关注</span>':''}
    </div>
    <div class="p3g">
      <div class="p3c"><div class="p3cl">主诊断</div><div class="p3cv" style="font-size:12px">${p.primaryDx}</div></div>
      <div class="p3c"><div class="p3cl">其他诊断</div><div class="p3cv" style="font-size:12px">${p.afType}心房颤动</div></div>
      <div class="p3c"><div class="p3cl">CHA₂DS₂-VASc 评分</div><div class="p3cv" style="color:${p.cha2ds2>=4?'var(--red)':p.cha2ds2>=2?'#D97706':'var(--green)'}">${p.cha2ds2} 分</div></div>
      <div class="p3c"><div class="p3cl">出血风险 (HAS-BLED)</div><div class="p3cv">${p.hasBleedRisk==='是'?'高风险':'低风险'}</div></div>
      <div class="p3c"><div class="p3cl">抗凝药物</div><div class="p3cv">${p.anticoag}</div></div>
      <div class="p3c"><div class="p3cl">用药状态</div><div class="p3cv"><span class="badge ${window.ANTICOAG_BADGE[p.anticoagStatus]||'b-gray'}">${p.anticoagStatus}</span></div></div>
    </div>
    <div class="stitle">最近两次心脏超声报告</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <div style="background:var(--bg);border-radius:6px;padding:12px">
        <div style="font-size:10.5px;color:var(--t3);margin-bottom:6px">第一次 · ${p.echo1.date}</div>
        <div style="font-size:11.5px;margin-bottom:3px">左房内径：<b>${p.echo1.la}</b></div>
        <div style="font-size:11.5px;margin-bottom:3px">射血分数：<b>${p.echo1.ef}</b></div>
        <div style="font-size:10.5px;color:var(--t2);margin-top:4px">${p.echo1.findings}</div>
      </div>
      <div style="background:var(--bg);border-radius:6px;padding:12px">
        <div style="font-size:10.5px;color:var(--t3);margin-bottom:6px">第二次 · ${p.echo2.date}</div>
        <div style="font-size:11.5px;margin-bottom:3px">左房内径：<b>${p.echo2.la}</b></div>
        <div style="font-size:11.5px;margin-bottom:3px">射血分数：<b>${p.echo2.ef}</b></div>
        <div style="font-size:10.5px;color:var(--t2);margin-top:4px">${p.echo2.findings}</div>
      </div>
    </div>
    <div class="stitle">管理建议</div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="btn btn-p" onclick="showToast('已标记：需要进一步管理')">需进一步管理</button>
      <button class="btn btn-g" onclick="showToast('已标记：当前方案合理')">当前方案合理</button>
      <button class="btn btn-amber" onclick="showToast('已转交电生理专科评估')">转交电生理评估</button>
    </div>
    <div style="margin-bottom:10px">
      <label style="font-size:11px;font-weight:600;display:block;margin-bottom:4px">备注</label>
      <textarea style="width:100%;padding:6px 8px;border:1px solid var(--bd);border-radius:5px;font-size:11.5px;height:56px;resize:vertical" placeholder="填写评估意见..."></textarea>
    </div>
    <button class="btn btn-p" style="width:100%;justify-content:center" onclick="showToast('评估意见已保存')">保存</button>`;
};

// ═══ VIEW ═══
function switchView(v){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.tab-btn')[v==='dept'?0:1].classList.add('active');document.getElementById('view-dept').classList[v==='dept'?'remove':'add']('vh');document.getElementById('view-doctor').classList[v==='doctor'?'remove':'add']('vh');}
function renderAll(){renderFunnel();renderDeptTable();renderStackedChart('stackedChart',groupData);renderSurgeryRate();renderDoctorView();}

initTime();seed(NOW_Y,NOW_M);renderAll();
</script>
</body>
</html>
